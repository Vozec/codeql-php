name: "php"
display_name: "PHP"
version: 0.1.0
column_kind: "utf8"
legacy_qltest_extraction: true
build_modes:
  - none
default_queries:
  - codeql/php-queries
github_api_languages:
  - PHP
scc_languages:
  - PHP
file_types:
  - name: php
    display_name: PHP files
    extensions:
      - .php
      - .php3
      - .php4
      - .php5
      - .php7
      - .phps
      - .phtml
      - .inc
options:
  trap:
    title: Options pertaining to TRAP.
    type: object
    properties:
      compression:
        title: Controls compression for the TRAP files written by the extractor.
        description: >
          This option is only intended for use in debugging the extractor. Accepted
          values are 'gzip' (the default), 'brotli', and 'none'.
        type: string
        pattern: "^(none|gzip|brotli)$"
