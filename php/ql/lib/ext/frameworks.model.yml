# PHP framework models (Models-as-Data).
#
# Add a new framework, router, source, sink, taint step or sanitizer by adding rows here — no QL and
# no engine change required. Columns:
#   sourceModel    : subjectKind, name, sourceType
#   sinkModel      : subjectKind, name, argIndex(-1=any), vulnKind
#   stepModel      : subjectKind, name, fromArg, toArg(-1=return)
#   sanitizerModel : subjectKind, name
# subjectKind is "function", "method" or "staticmethod".

extensions:
  # ---- Sources ---------------------------------------------------------------------------------
  - addsTo:
      pack: codeql/php-all
      extensible: sourceModel
    data:
      # Laravel
      - ["staticmethod", "input", "laravel-request"]
      - ["staticmethod", "all", "laravel-request"]
      # (bare method names `route`/`boolean`/`file`/`get` removed — they collide with ordinary
      #  `$obj->get()`/`$obj->file()` etc. and fire as sources on unrelated classes. A class-qualified
      #  method source is the proper fix; until the schema supports it, prefer precision here.)
      # Symfony (HttpFoundation) — distinctive accessor names only
      - ["method", "getContent", "symfony-request-body"]
      # WordPress
      - ["function", "wp_unslash", "wordpress-request"]
      - ["function", "get_query_var", "wordpress-query-var"]
      # Slim / PSR-7
      - ["method", "getQueryParams", "psr7-request"]
      - ["method", "getParsedBody", "psr7-request"]
      # PrestaShop (Tools::getValue reads request input)
      - ["staticmethod", "getValue", "prestashop-input"]
      - ["staticmethod", "getAllValues", "prestashop-input"]

  # ---- Sinks -----------------------------------------------------------------------------------
  - addsTo:
      pack: codeql/php-all
      extensible: sinkModel
    data:
      # NOTE: Laravel raw-SQL sinks (whereRaw/selectRaw/... at arg 0) live in laravel.model.yml, and
      # the Symfony/Laravel redirect sinks in their own files — kept there to avoid duplicate rows with
      # a divergent argIndex (a -1 duplicate here silently re-widened selectRaw's SAFE bindings arg).
      # `e()` is the Blade ESCAPER — a sanitizer (below), never an XSS sink.
      # Symfony process
      - ["method", "mustRun", -1, "command injection"]

  # ---- Taint steps -----------------------------------------------------------------------------
  - addsTo:
      pack: codeql/php-all
      extensible: stepModel
    data:
      # Laravel collection / string helpers propagate taint arg -> return
      - ["function", "collect", 0, -1]
      - ["method", "toArray", -1, -1]
      - ["method", "first", -1, -1]
      - ["function", "str_contains", 0, -1]

  # ---- Sanitizers ------------------------------------------------------------------------------
  - addsTo:
      pack: codeql/php-all
      extensible: sanitizerModel
    data:
      # Laravel / Symfony / WordPress escapers & validators
      - ["function", "e"]
      - ["method", "validate"]
      - ["function", "esc_sql"]
      - ["staticmethod", "escape"]
