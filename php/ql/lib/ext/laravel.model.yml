# Laravel core Models-as-Data.
#
# Lets taint flow *through* the Laravel framework without extracting `vendor/`: request helpers are
# sources, Eloquent/DB raw APIs are sinks, Str/Arr/Collection helpers propagate taint, and the
# validation/escaping helpers are sanitizers. Add a row to extend — no QL, no engine change.
#
#   sourceModel    : subjectKind, name, sourceType
#   sinkModel      : subjectKind, name, argIndex(-1=any), vulnKind
#   stepModel      : subjectKind, name, fromArg, toArg(-1=return)
#   sanitizerModel : subjectKind, name

extensions:
  # ---- Sources: request input --------------------------------------------------------------------
  - addsTo: { pack: codeql/php-all, extensible: sourceModel }
    data:
      - ["function", "request", "laravel-request"]
      - ["function", "old", "laravel-request"]                 # form repopulation
      - ["method", "input", "laravel-request"]
      - ["method", "query", "laravel-request"]
      - ["method", "post", "laravel-request"]
      - ["method", "all", "laravel-request"]
      - ["method", "only", "laravel-request"]
      - ["method", "except", "laravel-request"]
      - ["method", "json", "laravel-request"]
      - ["method", "string", "laravel-request"]
      - ["method", "getContent", "laravel-request"]
      - ["method", "route", "laravel-route-parameter"]         # $request->route('id')
      - ["staticmethod", "input", "laravel-request"]           # Request::input()
      - ["staticmethod", "all", "laravel-request"]
      - ["staticmethod", "get", "laravel-request"]

  # Class-qualified request accessors: a source ONLY on a `Request` receiver, so the generic names
  # (`get`/`header`/`cookie`/`boolean`/`file`) that collide with ordinary objects no longer FP.
  - addsTo: { pack: codeql/php-all, extensible: typedSourceModel }
    data:
      - ["Request", "get", "laravel-request"]
      - ["Request", "header", "laravel-request"]
      - ["Request", "cookie", "laravel-request"]
      - ["Request", "boolean", "laravel-request"]
      - ["Request", "file", "laravel-request"]
      - ["Request", "input", "laravel-request"]
      - ["Request", "query", "laravel-request"]
      - ["Request", "post", "laravel-request"]
      - ["Request", "all", "laravel-request"]

  # ---- Sinks: Eloquent / DB raw SQL --------------------------------------------------------------
  - addsTo: { pack: codeql/php-all, extensible: sinkModel }
    data:
      # Only the SQL-string argument (index 0) is the sink; index 1 is the parameterised
      # bindings array (`selectRaw('a = ?', [$x])`) which is SAFE — so NOT arg -1.
      - ["staticmethod", "raw", 0, "SQL injection"]            # DB::raw
      - ["staticmethod", "select", 0, "SQL injection"]         # DB::select
      - ["staticmethod", "statement", 0, "SQL injection"]      # DB::statement
      - ["staticmethod", "unprepared", 0, "SQL injection"]     # DB::unprepared
      - ["method", "whereRaw", 0, "SQL injection"]
      - ["method", "orWhereRaw", 0, "SQL injection"]
      - ["method", "havingRaw", 0, "SQL injection"]
      - ["method", "orHavingRaw", 0, "SQL injection"]
      - ["method", "orderByRaw", 0, "SQL injection"]
      - ["method", "groupByRaw", 0, "SQL injection"]
      - ["method", "selectRaw", 0, "SQL injection"]
      - ["method", "fromRaw", 0, "SQL injection"]
      # Column-name injection: PDO cannot bind identifiers, so a tainted COLUMN (arg 0) is unsafe
      # even though the value arg is parameterised. Query-builder column/order/aggregate methods.
      - ["method", "orderBy", 0, "SQL injection"]
      - ["method", "orderByDesc", 0, "SQL injection"]
      - ["method", "groupBy", 0, "SQL injection"]
      - ["method", "pluck", 0, "SQL injection"]
      - ["method", "having", 0, "SQL injection"]
      - ["method", "where", 0, "SQL injection"]
      - ["method", "select", 0, "SQL injection"]
      # aggregate helpers take a COLUMN name (tainted column = injection), same rationale as pluck/where
      - ["method", "max", 0, "SQL injection"]
      - ["method", "min", 0, "SQL injection"]
      - ["method", "avg", 0, "SQL injection"]
      - ["method", "sum", 0, "SQL injection"]
      # redirects (open redirect)
      - ["function", "redirect", 0, "open redirect"]
      - ["method", "away", 0, "open redirect"]
      - ["method", "to", 0, "open redirect"]

  # ---- Steps: helpers that carry taint arg -> return ---------------------------------------------
  - addsTo: { pack: codeql/php-all, extensible: stepModel }
    data:
      # global helpers
      - ["function", "collect", 0, -1]
      - ["function", "str", 0, -1]
      - ["function", "data_get", 0, -1]
      - ["function", "value", 0, -1]
      # Str::  (fluent string helpers)
      - ["staticmethod", "of", 0, -1]
      - ["staticmethod", "lower", 0, -1]
      - ["staticmethod", "upper", 0, -1]
      - ["staticmethod", "title", 0, -1]
      - ["staticmethod", "replace", -1, -1]
      - ["staticmethod", "finish", 0, -1]
      - ["staticmethod", "start", 0, -1]
      - ["staticmethod", "after", 0, -1]
      - ["staticmethod", "before", 0, -1]
      # Arr::
      - ["staticmethod", "get", 0, -1]
      - ["staticmethod", "first", 0, -1]
      - ["staticmethod", "pluck", 0, -1]
      # Collection / Eloquent fluent (instance)
      - ["method", "toArray", -1, -1]
      - ["method", "first", -1, -1]
      - ["method", "map", -1, -1]
      - ["method", "filter", -1, -1]
      - ["method", "pluck", -1, -1]
      - ["method", "value", -1, -1]
      - ["method", "implode", -1, -1]

  # ---- Sanitizers -------------------------------------------------------------------------------
  - addsTo: { pack: codeql/php-all, extensible: sanitizerModel }
    data:
      - ["function", "e"]                                      # Blade escape
      - ["method", "validate"]                                # $request->validate()
      - ["staticmethod", "slug"]                             # Str::slug
