# PHP built-in functions as Models-as-Data.
#
# The ENGINE (how a call propagates, dispatches, mutates) lives in QL and is language-general. The
# COVERAGE — which built-in function is a source / sink / sanitizer / taint step — is DATA and lives
# here, so it is extended by adding rows, never by editing QL. Columns:
#   sourceModel    : subjectKind, name, sourceType
#   sinkModel      : subjectKind, name, argIndex(-1=any), vulnKind
#   stepModel      : subjectKind, name, fromArg(-1=any), toArg(-1=return)
#   sanitizerModel : subjectKind, name
# subjectKind is "function" for all built-ins below.

extensions:
  # ---- Sources: built-in request/environment readers ------------------------------------------
  - addsTo:
      pack: codeql/php-all
      extensible: sourceModel
    data:
      # NOTE: `getenv` is NOT a blanket source — `getenv('TEMP'/'PATH'/'HOME'/…)` are server-controlled.
      # A structural `GetenvSource` (FlowSources.qll) fires only for user-controllable names (`HTTP_*`,
      # request-derived) or a dynamic/absent key (conservative).
      - ["function", "apache_request_headers", "remote"]
      - ["function", "getallheaders", "remote"]
      - ["function", "filter_input", "remote"]
      - ["function", "filter_input_array", "remote"]

  # ---- Sinks: dangerous built-in functions (any argument) -------------------------------------
  - addsTo:
      pack: codeql/php-all
      extensible: sinkModel
    data:
      # command injection
      - ["function", "system", -1, "command injection"]
      - ["function", "exec", -1, "command injection"]
      - ["function", "shell_exec", -1, "command injection"]
      - ["function", "passthru", -1, "command injection"]
      - ["function", "proc_open", -1, "command injection"]
      - ["function", "popen", -1, "command injection"]
      # code injection
      - ["function", "eval", -1, "code injection"]
      - ["function", "assert", -1, "code injection"]
      - ["function", "create_function", -1, "code injection"]
      # SQL injection
      - ["function", "mysqli_query", -1, "SQL injection"]
      - ["function", "mysql_query", -1, "SQL injection"]
      - ["function", "pg_query", -1, "SQL injection"]
      - ["function", "pg_send_query", -1, "SQL injection"]
      # reflected XSS
      - ["function", "print", -1, "reflected XSS"]
      - ["function", "printf", -1, "reflected XSS"]
      - ["function", "print_r", -1, "reflected XSS"]
      - ["function", "vprintf", -1, "reflected XSS"]
      # user error message is echoed to the page when display_errors is on
      - ["function", "trigger_error", 0, "reflected XSS"]
      - ["function", "user_error", 0, "reflected XSS"]
      # path traversal
      - ["function", "fopen", -1, "path traversal"]
      - ["function", "file_get_contents", -1, "path traversal"]
      - ["function", "file_put_contents", -1, "path traversal"]
      - ["function", "readfile", -1, "path traversal"]
      - ["function", "file", -1, "path traversal"]
      - ["function", "unlink", -1, "path traversal"]
      - ["function", "fwrite", -1, "path traversal"]
      # move_uploaded_file($tmp, $dest) — the canonical upload sink. The DESTINATION (arg 1) decides
      # where (and under what name/extension) the upload lands; an attacker-controlled destination is
      # arbitrary file write => webshell/RCE. arg 0 is the server-set temp path, so scope to arg 1.
      - ["function", "move_uploaded_file", 1, "path traversal"]
      - ["function", "copy", -1, "path traversal"]
      - ["function", "rename", -1, "path traversal"]
      - ["function", "mkdir", -1, "path traversal"]
      - ["function", "rmdir", -1, "path traversal"]
      - ["function", "scandir", -1, "path traversal"]
      - ["function", "opendir", -1, "path traversal"]
      # hash_file(algo, FILENAME): only arg 1 is the path (arg 0 is the algorithm string).
      - ["function", "hash_file", 1, "path traversal"]
      # ---- Blind file read via PHP filter chains (error-based oracle, per Synacktiv). These primitives
      # take a user-controlled path that PHP resolves through stream wrappers (`php://filter/...`), so an
      # arbitrary local file can be read even though the function returns only a hash / metadata / no
      # displayed content — hence NOT classic path traversal. See `file read` sinks below.
      - ["function", "md5_file", 0, "file read"]
      - ["function", "sha1_file", 0, "file read"]
      - ["function", "crc32_file", 0, "file read"]
      - ["function", "hash_file", 1, "file read"]
      - ["function", "getimagesize", 0, "file read"]
      - ["function", "mime_content_type", 0, "file read"]
      - ["function", "exif_read_data", 0, "file read"]
      - ["function", "exif_imagetype", 0, "file read"]
      - ["function", "exif_thumbnail", 0, "file read"]
      - ["function", "finfo_file", 1, "file read"]        # finfo_file($finfo, FILENAME)
      - ["function", "parse_ini_file", 0, "file read"]
      - ["function", "gzfile", 0, "file read"]
      - ["function", "readgzfile", 0, "file read"]
      - ["function", "highlight_file", 0, "file read"]
      - ["function", "show_source", 0, "file read"]
      # the content-displaying readers below are ALSO filter-chain sinks; they already appear as path
      # traversal above, but list them here too so the dedicated file-read query reports them.
      - ["function", "file_get_contents", 0, "file read"]
      - ["function", "readfile", 0, "file read"]
      - ["function", "file", 0, "file read"]
      - ["function", "fopen", 0, "file read"]
      - ["function", "copy", 0, "file read"]
      # open redirect
      # NOTE: `header()` is an open-redirect sink ONLY for a `Location:` header — modelled
      # structurally in FlowSources (a blanket arg row also flagged `header('X-Foo: '.$x)`).
      - ["function", "http_redirect", -1, "open redirect"]
      # server-side request forgery
      - ["function", "curl_setopt", -1, "server-side request forgery"]
      - ["function", "curl_init", -1, "server-side request forgery"]
      - ["function", "fsockopen", -1, "server-side request forgery"]
      - ["function", "stream_socket_client", -1, "server-side request forgery"]
      - ["function", "get_headers", -1, "server-side request forgery"]
      # LDAP injection
      - ["function", "ldap_search", -1, "LDAP injection"]
      - ["function", "ldap_list", -1, "LDAP injection"]
      - ["function", "ldap_read", -1, "LDAP injection"]
      - ["function", "ldap_bind", -1, "LDAP injection"]
      # unsafe deserialization
      - ["function", "unserialize", -1, "unsafe deserialization"]

  # ---- Sanitizers: built-in encoders / escapers / validators (value-returning) ----------------
  - addsTo:
      pack: codeql/php-all
      extensible: sanitizerModel
    data:
      - ["function", "htmlspecialchars"]
      - ["function", "htmlentities"]
      - ["function", "strip_tags"]
      - ["function", "esc_html"]
      - ["function", "esc_attr"]
      - ["function", "esc_url"]
      - ["function", "esc_js"]
      - ["function", "sanitize_email"]
      - ["function", "wp_kses"]
      - ["function", "wp_kses_post"]
      - ["function", "escapeshellarg"]
      - ["function", "escapeshellcmd"]
      - ["function", "mysqli_real_escape_string"]
      - ["function", "mysql_real_escape_string"]
      - ["function", "pg_escape_string"]
      - ["function", "pg_escape_literal"]
      - ["function", "addslashes"]
      - ["function", "quote"]
      - ["function", "intval"]
      - ["function", "floatval"]
      - ["function", "doubleval"]
      - ["function", "abs"]
      - ["function", "count"]
      - ["function", "settype"]
      - ["function", "basename"]
      - ["function", "realpath"]
      - ["function", "filter_var"]
      - ["function", "preg_quote"]
      - ["function", "urlencode"]
      - ["function", "rawurlencode"]
      - ["function", "base64_encode"]
      - ["function", "bin2hex"]
      - ["function", "md5"]
      - ["function", "sha1"]
      - ["function", "hash"]
      # Method escapers on a driver handle (`$pdo->quote($x)`, `$mysqli->real_escape_string($x)`).
      - ["method", "quote"]
      - ["method", "escape"]
      - ["method", "real_escape_string"]

  # ---- Sanitizer GUARDS: validators used as `if (g($x)) { …safe… }` branch conditions ----------
  - addsTo:
      pack: codeql/php-all
      extensible: sanitizerGuardModel
    data:
      - ["ctype_alnum"]
      - ["ctype_digit"]
      - ["ctype_alpha"]
      - ["ctype_xdigit"]
      - ["ctype_upper"]
      - ["ctype_lower"]
      - ["is_numeric"]
      - ["is_int"]
      - ["is_integer"]
      - ["is_float"]
      - ["is_double"]
      - ["in_array"]
      - ["array_key_exists"]
      - ["preg_match"]

  # ---- Taint steps: string built-ins that propagate any argument to the result ----------------
  - addsTo:
      pack: codeql/php-all
      extensible: stepModel
    data:
      # Exception message accessor: `$e->getMessage()` returns the message the exception carries
      # (receiver -> return). Paired with the `new *Exception($msg)` message step in TaintTrackingPrivate.
      - ["method", "getMessage", -2, -1]
      - ["function", "strtoupper", -1, -1]
      - ["function", "strtolower", -1, -1]
      - ["function", "ucfirst", -1, -1]
      - ["function", "ucwords", -1, -1]
      - ["function", "lcfirst", -1, -1]
      - ["function", "trim", -1, -1]
      - ["function", "ltrim", -1, -1]
      - ["function", "rtrim", -1, -1]
      - ["function", "substr", -1, -1]
      - ["function", "str_replace", -1, -1]
      - ["function", "str_ireplace", -1, -1]
      - ["function", "str_contains", 0, -1]
      - ["function", "preg_replace", -1, -1]
      - ["function", "preg_replace_callback", -1, -1]
      - ["function", "sprintf", -1, -1]
      - ["function", "vsprintf", -1, -1]
      - ["function", "implode", -1, -1]
      - ["function", "join", -1, -1]
      - ["function", "strrev", -1, -1]
      - ["function", "str_repeat", -1, -1]
      - ["function", "str_pad", -1, -1]
      - ["function", "substr_replace", -1, -1]
      - ["function", "strtr", -1, -1]
      - ["function", "chunk_split", -1, -1]
      - ["function", "nl2br", -1, -1]
      - ["function", "wordwrap", -1, -1]
      - ["function", "strval", -1, -1]
      - ["function", "urldecode", -1, -1]
      - ["function", "rawurldecode", -1, -1]
      - ["function", "base64_decode", -1, -1]
      - ["function", "json_decode", -1, -1]
      - ["function", "unserialize", -1, -1]
      - ["function", "stripslashes", -1, -1]
      - ["function", "stripcslashes", -1, -1]
      - ["function", "html_entity_decode", -1, -1]
      - ["function", "htmlspecialchars_decode", -1, -1]
      - ["function", "utf8_decode", -1, -1]
      - ["function", "utf8_encode", -1, -1]
      - ["function", "hex2bin", -1, -1]
      - ["function", "quotemeta", -1, -1]
      # Array higher-order: the data array (any argument) flows to the result. The callback transforms
      # each element; taint is preserved regardless of callback kind (string / variable / inline).
      - ["function", "array_map", -1, -1]
      - ["function", "array_filter", -1, -1]
      - ["function", "array_walk", -1, -1]
      - ["function", "array_reduce", -1, -1]
      # String -> array splitters: each part carries the input's taint.
      - ["function", "explode", -1, -1]
      - ["function", "str_split", -1, -1]
      - ["function", "mb_str_split", -1, -1]
      - ["function", "preg_split", -1, -1]
      - ["function", "str_getcsv", -1, -1]
      # Array transforms that preserve element taint (data -> result).
      - ["function", "array_values", -1, -1]
      - ["function", "array_keys", -1, -1]
      - ["function", "array_merge", -1, -1]
      - ["function", "array_merge_recursive", -1, -1]
      - ["function", "array_replace", -1, -1]
      - ["function", "array_slice", -1, -1]
      - ["function", "array_splice", -1, -1]
      - ["function", "array_reverse", -1, -1]
      - ["function", "array_unique", -1, -1]
      - ["function", "array_flip", -1, -1]
      - ["function", "array_pad", -1, -1]
      - ["function", "array_fill", -1, -1]
      - ["function", "array_combine", -1, -1]
      - ["function", "array_column", -1, -1]
      - ["function", "array_chunk", -1, -1]
      - ["function", "array_diff", -1, -1]
      - ["function", "array_intersect", -1, -1]
      - ["function", "compact", -1, -1]
      - ["function", "current", -1, -1]
      - ["function", "reset", -1, -1]
      - ["function", "end", -1, -1]
      - ["function", "array_shift", -1, -1]
      - ["function", "array_pop", -1, -1]

  # ---- Higher-order callbacks: which arg is the callable, and where the data begins --------------
  - addsTo:
      pack: codeql/php-all
      extensible: callbackModel
    data:
      - ["call_user_func", 0, 1]
      - ["call_user_func_array", 0, 1]
      - ["array_map", 0, 1]
      - ["register_shutdown_function", 0, 1]
      - ["array_walk", 1, 0]
      - ["array_walk_recursive", 1, 0]
      - ["array_filter", 1, 0]
      - ["array_reduce", 1, 0]
      - ["usort", 1, 0]
      - ["uasort", 1, 0]
      - ["uksort", 1, 0]
      - ["preg_replace_callback", 1, 2]

  # ---- By-reference output writers: taint a &$out argument from an input argument ---------------
  - addsTo:
      pack: codeql/php-all
      extensible: outRefModel
    data:
      - ["parse_str", 0, 1]         # parse_str($tainted, $out)
      - ["mb_parse_str", 0, 1]
      - ["preg_match", 1, 2]        # preg_match($pat, $subj, $matches) — $matches from $subj
      - ["preg_match_all", 1, 2]
      - ["sscanf", 0, 2]            # sscanf($str, $fmt, &$out)

  # ---- Typed method sinks: file-reading methods on built-in classes (filter-chain file read) --------
  - addsTo:
      pack: codeql/php-all
      extensible: typedSinkModel
    data:
      - ["finfo", "file", 0, "file read"]               # (new finfo())->file($path)
      - ["SplFileObject", "__construct", 0, "file read"]
      - ["SplFileInfo", "__construct", 0, "file read"]
      - ["SplFileInfo", "openFile", 0, "file read"]
