# WordPress core Models-as-Data (security-relevant APIs).
extensions:
  - addsTo: { pack: codeql/php-all, extensible: sourceModel }
    data:
      - ["function", "wp_unslash", "wordpress-request"]
      - ["function", "get_query_var", "wordpress-query-var"]
      - ["function", "stripslashes_deep", "wordpress-request"]
  - addsTo: { pack: codeql/php-all, extensible: sinkModel }
    data:
      # $wpdb query helpers (fairly WP-specific names)
      - ["method", "get_results", -1, "SQL injection"]
      - ["method", "get_var", -1, "SQL injection"]
      - ["method", "get_col", -1, "SQL injection"]
      - ["method", "get_row", -1, "SQL injection"]
      - ["method", "query", -1, "SQL injection"]
      # HTTP fetch helpers — every WP remote wrapper is an SSRF sink on its URL argument.
      - ["function", "wp_remote_get", 0, "server-side request forgery"]
      - ["function", "wp_remote_post", 0, "server-side request forgery"]
      - ["function", "wp_remote_head", 0, "server-side request forgery"]
      - ["function", "wp_remote_request", 0, "server-side request forgery"]
      - ["function", "wp_remote_fopen", 0, "server-side request forgery"]
      - ["function", "wp_safe_remote_get", 0, "server-side request forgery"]
      - ["function", "wp_safe_remote_post", 0, "server-side request forgery"]
      - ["function", "wp_safe_remote_head", 0, "server-side request forgery"]
      - ["function", "wp_safe_remote_request", 0, "server-side request forgery"]
      - ["function", "vip_safe_wp_remote_get", 0, "server-side request forgery"]
      - ["function", "wp_oembed_get", 0, "server-side request forgery"]
      - ["function", "download_url", 0, "server-side request forgery"]
      # Redirects
      - ["function", "wp_redirect", 0, "open redirect"]
      - ["function", "wp_safe_redirect", 0, "open redirect"]
      # Filesystem
      - ["function", "wp_delete_file", 0, "path traversal"]
      - ["function", "filesize", -1, "path traversal"]
      # Object injection
      - ["function", "maybe_unserialize", 0, "unsafe deserialization"]
  - addsTo: { pack: codeql/php-all, extensible: sanitizerModel }
    data:
      - ["function", "esc_html"]
      - ["function", "esc_attr"]
      - ["function", "esc_url"]
      - ["function", "esc_js"]
      - ["function", "esc_sql"]
      - ["function", "sanitize_email"]
      - ["function", "sanitize_key"]
      - ["function", "sanitize_title"]
      - ["function", "sanitize_file_name"]
      - ["function", "wp_kses"]
      - ["function", "wp_kses_post"]
      - ["function", "wp_kses_data"]
      - ["function", "esc_textarea"]
      - ["function", "esc_url_raw"]
      - ["function", "absint"]
  # HTML-only: strips tags but leaves quotes — a barrier for XSS, NOT for SQL/path/command. Modelling
  # these as full sanitizers would hide the sanitize-then-SQLi class (CVE-2024-1071, CVE-2023-6360).
  - addsTo: { pack: codeql/php-all, extensible: weakXssSanitizerModel }
    data:
      - ["function", "sanitize_text_field"]
      - ["function", "sanitize_textarea_field"]
  # ...but they still CARRY taint (arg -> return) so a non-XSS sink downstream (SQL, path) is reached.
  - addsTo: { pack: codeql/php-all, extensible: stepModel }
    data:
      - ["function", "sanitize_text_field", 0, -1]
      - ["function", "sanitize_textarea_field", 0, -1]

  # Type-scoped: `$wpdb->prepare()` sanitizes ONLY on a real wpdb (a custom ->prepare() does not).
  - addsTo: { pack: codeql/php-all, extensible: typedSanitizerModel }
    data:
      - ["wpdb", "prepare"]

  # REST request object: `$request->get_param(...)` etc. — generic `get_*` names, so class-scoped.
  - addsTo: { pack: codeql/php-all, extensible: typedSourceModel }
    data:
      - ["WP_REST_Request", "get_param", "wordpress-request"]
      - ["WP_REST_Request", "get_params", "wordpress-request"]
      - ["WP_REST_Request", "get_query_params", "wordpress-request"]
      - ["WP_REST_Request", "get_body_params", "wordpress-request"]
      - ["WP_REST_Request", "get_json_params", "wordpress-request"]
      - ["WP_REST_Request", "get_url_params", "wordpress-request"]
      - ["WP_REST_Request", "get_body", "wordpress-request"]
      - ["WP_REST_Request", "get_header", "wordpress-request"]

  # More output/SSRF sinks (echo is a language construct; these are the WP echo/fetch wrappers).
  - addsTo: { pack: codeql/php-all, extensible: sinkModel }
    data:
      - ["function", "_e", 0, "reflected XSS"]                  # translate + echo (unescaped)
      - ["function", "_ex", 0, "reflected XSS"]
      - ["function", "wp_die", 0, "reflected XSS"]             # $message rendered as HTML
      - ["function", "fetch_feed", 0, "server-side request forgery"]

  # Steps: WP helpers that carry taint through (essential first hops from the superglobals).
  - addsTo: { pack: codeql/php-all, extensible: stepModel }
    data:
      - ["function", "wp_unslash", 0, -1]
      - ["function", "stripslashes_deep", 0, -1]
      - ["function", "map_deep", 0, -1]
      - ["function", "wp_parse_args", 0, -1]
      - ["function", "add_query_arg", -1, -1]                   # builds a URL from its args (XSS when echoed)
      - ["function", "remove_query_arg", -1, -1]

  # Shortcode callbacks: `add_shortcode('tag', fn($atts, $content) => …)` — the untyped $atts/$content
  # closure params are user-controlled shortcode input (handled by the generic route-handler mechanism).
  - addsTo: { pack: codeql/php-all, extensible: routeHandlerModel }
    data:
      - ["function", "add_shortcode", 1]
